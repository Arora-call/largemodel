<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气预报</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>🌤️ 天气预报</h1>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入城市名称..." value="北京">
        <button id="searchBtn">搜索</button>
      </div>
    </header>

    <main>
      <!-- 当前天气 -->
      <section id="currentWeather" class="current-weather">
        <div class="weather-main">
          <div class="location">
            <h2 id="cityName">北京</h2>
            <p id="dateTime" class="date-time">加载中...</p>
          </div>
          <div class="temperature-section">
            <span id="weatherIcon" class="weather-icon">☀️</span>
            <span id="currentTemp" class="temp">25°</span>
            <span id="weatherDesc" class="weather-desc">晴</span>
          </div>
          <div class="extra-info">
            <div class="info-item">
              <span class="label">体感温度</span>
              <span id="feelsLike" class="value">24°</span>
            </div>
            <div class="info-item">
              <span class="label">湿度</span>
              <span id="humidity" class="value">60%</span>
            </div>
            <div class="info-item">
              <span class="label">风速</span>
              <span id="windSpeed" class="value">3级</span>
            </div>
            <div class="info-item">
              <span class="label">空气质量</span>
              <span id="aqi" class="value">良</span>
            </div>
          </div>
        </div>
      </section>

      <!-- 五日预报 -->
      <section class="forecast">
        <h3>📅 未来五天预报</h3>
        <div id="forecastContainer" class="forecast-grid">
          <!-- 动态生成 -->
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2025 天气预报 - 数据模拟演示</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
