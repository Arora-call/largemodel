<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天气预报</title>
    <style>
        /* ===== Reset & Global ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e8edf3;
        }

        .weather-app {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 48px;
            padding: 32px 32px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        /* ===== Header ===== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
            background: linear-gradient(135deg, #f0f6ff, #9bb9e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-title span {
            font-size: 26px;
            -webkit-text-fill-color: initial;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border 0.3s, background 0.3s;
            flex: 1 1 260px;
            max-width: 360px;
        }

        .search-box:focus-within {
            background: rgba(255, 255, 255, 0.11);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .search-box input {
            background: none;
            border: none;
            outline: none;
            color: #f0f6ff;
            font-size: 15px;
            padding: 10px 0;
            width: 100%;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-box button {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 60px;
            padding: 10px 22px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
            margin-left: 6px;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.25);
        }

        .search-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 22px rgba(59, 130, 246, 0.35);
        }

        .search-box button:active {
            transform: scale(0.97);
        }

        /* ===== Current Weather ===== */
        .current-weather {
            display: flex;
            flex-wrap: wrap;
            gap: 24px 40px;
            padding: 16px 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 28px;
        }

        .current-main {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1 1 240px;
        }

        .weather-icon-big {
            font-size: 76px;
            line-height: 1;
            filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.3));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .temp-group {
            display: flex;
            flex-direction: column;
        }

        .temp-current {
            font-size: 64px;
            font-weight: 300;
            letter-spacing: -2px;
            line-height: 1;
            color: #fff;
        }

        .temp-current .deg {
            font-size: 32px;
            font-weight: 300;
            vertical-align: super;
            color: rgba(255, 255, 255, 0.7);
        }

        .weather-desc {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 4px;
            text-transform: capitalize;
            letter-spacing: 0.4px;
        }

        .current-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 28px;
            flex: 1 1 200px;
            align-self: center;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
        }

        .detail-item .label {
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            min-width: 44px;
        }

        .detail-item .value {
            font-weight: 500;
            color: #f0f6ff;
        }

        .detail-item .icon {
            font-size: 20px;
            width: 28px;
            text-align: center;
            opacity: 0.7;
        }

        /* ===== Forecast ===== */
        .forecast-title {
            font-size: 16px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 18px 8px 16px;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.25s, transform 0.2s;
        }

        .forecast-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
        }

        .forecast-day {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
        }

        .forecast-icon {
            font-size: 36px;
            line-height: 1.2;
            margin: 4px 0;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        .forecast-temps {
            display: flex;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
            margin-top: 6px;
        }

        .forecast-high {
            color: #fff;
            font-weight: 500;
        }

        .forecast-low {
            color: rgba(255, 255, 255, 0.45);
        }

        .forecast-condition {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 2px;
        }

        /* ===== Error / Loading ===== */
        .message-area {
            text-align: center;
            padding: 12px 0;
            font-size: 15px;
            min-height: 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        .message-area.error {
            color: #f87171;
        }

        /* ===== Spinner ===== */
        .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== Responsive ===== */
        @media (max-width: 700px) {
            .weather-app {
                padding: 24px 18px 30px;
                border-radius: 32px;
            }

            .temp-current {
                font-size: 50px;
            }
            .weather-icon-big {
                font-size: 60px;
            }
            .current-details {
                grid-template-columns: 1fr 1fr;
                gap: 6px 16px;
            }
            .forecast-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 8px;
            }
            .forecast-card {
                padding: 14px 4px 12px;
            }
            .forecast-icon {
                font-size: 28px;
            }
        }

        @media (max-width: 520px) {
            .weather-app {
                padding: 18px 12px 24px;
                border-radius: 24px;
            }
            .app-header {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: 100%;
                flex: 1 1 auto;
            }
            .current-weather {
                flex-direction: column;
                gap: 12px;
            }
            .current-main {
                justify-content: center;
            }
            .temp-current {
                font-size: 44px;
            }
            .weather-icon-big {
                font-size: 52px;
            }
            .current-details {
                grid-template-columns: 1fr 1fr;
                gap: 6px 12px;
            }
            .forecast-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 6px;
            }
            .forecast-card {
                padding: 10px 2px 10px;
                border-radius: 16px;
            }
            .forecast-icon {
                font-size: 22px;
            }
            .forecast-temps {
                font-size: 13px;
                gap: 4px;
            }
            .forecast-day {
                font-size: 12px;
            }
            .forecast-condition {
                font-size: 11px;
            }
            .detail-item {
                font-size: 13px;
            }
        }

        @media (max-width: 420px) {
            .forecast-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 4px;
            }
            .forecast-card {
                padding: 8px 1px 8px;
            }
            .forecast-icon {
                font-size: 18px;
            }
            .forecast-temps {
                font-size: 11px;
                gap: 2px;
                flex-direction: column;
            }
            .temp-current {
                font-size: 36px;
            }
            .weather-icon-big {
                font-size: 42px;
            }
        }
    </style>
</head>
<body>

    <div class="weather-app" role="main" aria-label="天气预报应用">
        <!-- Header -->
        <header class="app-header">
            <div class="app-title">
                <span>⛅</span> 天气预报
            </div>
            <div class="search-box" role="search">
                <input type="text" id="cityInput" placeholder="输入城市名称…" aria-label="城市名称" value="北京" />
                <button id="searchBtn" aria-label="查询天气">查询</button>
            </div>
        </header>

        <!-- Current Weather -->
        <section class="current-weather" id="currentWeather" aria-label="当前天气">
            <div class="current-main">
                <div class="weather-icon-big" id="weatherIconBig">☀️</div>
                <div class="temp-group">
                    <div class="temp-current" id="tempCurrent">22<span class="deg">°C</span></div>
                    <div class="weather-desc" id="weatherDesc">晴朗</div>
                </div>
            </div>
            <div class="current-details">
                <div class="detail-item">
                    <span class="icon">🌡️</span>
                    <span class="label">体感</span>
                    <span class="value" id="feelsLike">21°C</span>
                </div>
                <div class="detail-item">
                    <span class="icon">💧</span>
                    <span class="label">湿度</span>
                    <span class="value" id="humidity">55%</span>
                </div>
                <div class="detail-item">
                    <span class="icon">💨</span>
                    <span class="label">风速</span>
                    <span class="value" id="windSpeed">12 km/h</span>
                </div>
                <div class="detail-item">
                    <span class="icon">👁️</span>
                    <span class="label">能见度</span>
                    <span class="value" id="visibility">10 km</span>
                </div>
            </div>
        </section>

        <!-- Forecast -->
        <section aria-label="未来天气预报">
            <h2 class="forecast-title">📅 未来 5 天</h2>
            <div class="forecast-grid" id="forecastGrid">
                <!-- 由 JS 动态渲染 -->
            </div>
        </section>

        <!-- Message Area -->
        <div class="message-area" id="messageArea"></div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== DOM 引用 =====
            const cityInput = document.getElementById('cityInput');
            const searchBtn = document.getElementById('searchBtn');
            const weatherIconBig = document.getElementById('weatherIconBig');
            const tempCurrent = document.getElementById('tempCurrent');
            const weatherDesc = document.getElementById('weatherDesc');
            const feelsLike = document.getElementById('feelsLike');
            const humidity = document.getElementById('humidity');
            const windSpeed = document.getElementById('windSpeed');
            const visibility = document.getElementById('visibility');
            const forecastGrid = document.getElementById('forecastGrid');

            // ===== 模拟城市天气数据 =====
            const CITY_WEATHER_MAP = {

                        { day: '周三', icon: '🌤️', high: 25, low: 14, condition: '晴间多云' },
                        { day: '周四', icon: '☀️', high: 27, low: 17, condition: '晴朗' },
                        { day: '周五', icon: '⛅', high: 23, low: 13, condition: '多云' }
                    ]
                },
                '上海': {
                    current: {

                        icon: '⛅'
                    },
                    forecast: [
                        { day: '周一', icon: '⛅', high: 29, low: 22, condition: '多云' },
                        { day: '周二', icon: '🌧️', high: 26, low: 21, condition: '阵雨' },
                        { day: '周三', icon: '⛅', high: 28, low: 22, condition: '多云' },
                        { day: '周四', icon: '☀️', high: 31, low: 23, condition: '晴' },
                        { day: '周五', icon: '🌧️', high: 27, low: 20, condition: '阵雨' }
                    ]
                },
                '广州': {
                    current: {
                        temp: 32,
                        feelsLike: 36,
                        humidity: 80,
                        windSpeed: 8,
                        visibility: 7,

                        icon: '☁️'
                    },
                    forecast: [
                        { day: '周一', icon: '☁️', high: 33, low: 25, condition: '阴' },
                        { day: '周二', icon: '⛈️', high: 30, low: 24, condition: '雷阵雨' },
                        { day: '周三', icon: '🌧️', high: 29, low: 23, condition: '中雨' },
                        { day: '周四', icon: '⛅', high: 31, low: 24, condition: '多云' },
                        { day: '周五', icon: '☀️', high: 33, low: 25, condition: '晴' }
                    ]
                },
                '深圳': {
                    current: {
                        temp: 31,
                        feelsLike: 35,
                        humidity: 78,
                        windSpeed: 9,
                        visibility: 8,
                        condition: '多云',
                        icon: '⛅'
                    },
                    forecast: [
                        { day: '周一', icon: '⛅', high: 32, low: 25, condition: '多云' },
                        { day: '周二', icon: '🌧️', high: 29, low: 24, condition: '阵雨' },
                        { day: '周三', icon: '⛅', high: 31, low: 24, condition: '多云' },
                        { day: '周四', icon: '☀️', high: 33, low: 26, condition: '晴' },
                        { day: '周五', icon: '🌧️', high: 30, low: 23, condition: '阵雨' }
                    ]
                },
                '杭州': {
                    current: {
                        temp: 26,
                        feelsLike: 27,
                        humidity: 62,
                        windSpeed: 11,
                        visibility: 10,
                        condition: '晴',
                        icon: '☀️'
                    },
                    forecast: [
                        { day: '周一', icon: '☀️', high: 28, low: 18, condition: '晴' },
                        { day: '周二', icon: '⛅', high: 26, low: 17, condition: '多云' },
                        { day: '周三', icon: '🌤️', high: 27, low: 18, condition: '晴间多云' },
                        { day: '周四', icon: '☀️', high: 29, low: 19, condition: '晴朗' },
                        { day: '周五', icon: '🌧️', high: 24, low: 16, condition: '小雨' }
                    ]
                },
                '成都': {
                    current: {
                        temp: 22,
                        feelsLike: 22,
                        humidity: 58,
                        windSpeed: 6,
                        visibility: 9,
                        condition: '阴',
                        icon: '☁️'
                    },
                    forecast: [
                        { day: '周一', icon: '☁️', high: 23, low: 16, condition: '阴' },
                        { day: '周二', icon: '🌧️', high: 20, low: 15, condition: '小雨' },
                        { day: '周三', icon: '⛅', high: 22, low: 15, condition: '多云' },
                        { day: '周四', icon: '☀️', high: 25, low: 17, condition: '晴' },
                        { day: '周五', icon: '⛅', high: 24, low: 16, condition: '多云' }
                    ]
                },
                '武汉': {
                    current: {
                        temp: 27,
                        feelsLike: 29,
                        humidity: 65,
                        windSpeed: 12,
                        visibility: 9,
                        condition: '多云',
                        icon: '⛅'
                    },
                    forecast: [
                        { day: '周一', icon: '⛅', high: 29, low: 20, condition: '多云' },
                        { day: '周二', icon: '🌧️', high: 26, low: 19, condition: '阵雨' },
                        { day: '周三', icon: '⛅', high: 28, low: 20, condition: '多云' },
                        { day: '周四', icon: '☀️', high: 31, low: 21, condition: '晴' },
                        { day: '周五', icon: '🌧️', high: 27, low: 18, condition: '阵雨' }
                    ]
                },
                '南京': {
                    current: {
                        temp: 25,
                        feelsLike: 25,
                        humidity: 55,
                        windSpeed: 10,
                        visibility: 11,
                        condition: '晴',
                        icon: '☀️'
                    },
                    forecast: [
                        { day: '周一', icon: '☀️', high: 27, low: 17, condition: '晴' },
                        { day: '周二', icon: '⛅', high: 25, low: 16, condition: '多云' },
                        { day: '周三', icon: '🌤️', high: 26, low: 17, condition: '晴间多云' },
                        { day: '周四', icon: '☀️', high: 28, low: 18, condition: '晴朗' },
                        { day: '周五', icon: '⛅', high: 24, low: 15, condition: '多云' }
                    ]
                },
                '重庆': {
                    current: {
                        temp: 29,
                        feelsLike: 32,
                        humidity: 70,
                        windSpeed: 7,
                        visibility: 6,
                        condition: '多云',
                        icon: '⛅'
                    },
                    forecast: [
                        { day: '周一', icon: '⛅', high: 31, low: 22, condition: '多云' },
                        { day: '周二', icon: '🌧️', high: 28, low: 21, condition: '阵雨' },
                        { day: '周三', icon: '☁️', high: 27, low: 20, condition: '阴' },
                        { day: '周四', icon: '⛅', high: 30, low: 22, condition: '多云' },
                        { day: '周五', icon: '🌧️', high: 27, low: 20, condition: '阵雨' }
                    ]
                }
            };

            // 默认城市
            const DEFAULT_CITY = '北京';

            // ===== 工具函数 =====
            function getDayName(index) {
                const names = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                const d = new Date();
                d.setDate(d.getDate() + index);
                return names[d.getDay()];
            }

            // 根据城市名获取数据（模拟异步）
            function fetchWeatherByCity(city) {
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        const trimmed = city.trim();
                        if (!trimmed) {
                            reject(new Error('请输入城市名称'));
                            return;
                        }
                        const data = CITY_WEATHER_MAP[trimmed];
                        if (!data) {
                            reject(new Error(`未找到「${trimmed}」的天气数据，试试：北京、上海、广州、深圳、杭州、成都、武汉、南京、重庆`));
                            return;
                        }
                        // 深层拷贝，并修正 forecast day 为实际日期
                        const result = JSON.parse(JSON.stringify(data));
                        result.forecast.forEach((item, idx) => {
                            item.day = getDayName(idx);
                        });
                        resolve(result);
                    }, 400);
                });
            }

            // ===== 渲染函数 =====
            function renderCurrentWeather(data) {
                const c = data.current;
                weatherIconBig.textContent = c.icon || '☀️';
                tempCurrent.innerHTML = `${c.temp}<span class="deg">°C</span>`;
                weatherDesc.textContent = c.condition || '—';
                feelsLike.textContent = c.feelsLike ? `${c.feelsLike}°C` : '—';
                humidity.textContent = c.humidity ? `${c.humidity}%` : '—';
                windSpeed.textContent = c.windSpeed ? `${c.windSpeed} km/h` : '—';
                visibility.textContent = c.visibility ? `${c.visibility} km` : '—';
            }

            function renderForecast(forecast) {
                if (!forecast || forecast.length === 0) {
                    forecastGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,0.4);">暂无预报数据</div>';
                    return;
                }
                let html = '';
                forecast.forEach(item => {
                    html += `
                        <div class="forecast-card">
                            <div class="forecast-day">${item.day}</div>
                            <div class="forecast-icon">${item.icon || '☀️'}</div>
                            <div class="forecast-temps">
                                <span class="forecast-high">${item.high}°</span>
                                <span class="forecast-low">${item.low}°</span>
                            </div>
                            <div class="forecast-condition">${item.condition || ''}</div>
                        </div>
                    `;
                });
                forecastGrid.innerHTML = html;
            }

            function setMessage(msg, isError) {
                messageArea.textContent = msg || '';
                messageArea.className = 'message-area' + (isError ? ' error' : '');
            }

            function showLoading() {
                messageArea.innerHTML = '<div class="spinner"></div>';
                messageArea.className = 'message-area';
            }

            // ===== 核心加载函数 =====
            function loadWeather(city) {
                showLoading();
                fetchWeatherByCity(city)
                    .then(data => {
                        renderCurrentWeather(data);
                        renderForecast(data.forecast);
                        setMessage('');
                    })
                    .catch(err => {
                        setMessage(err.message, true);
                        // 不清空已有天气数据，保留上次
                    });
            }

            // ===== 事件绑定 =====
            function handleSearch() {
                const city = cityInput.value.trim();
                if (!city) {
                    setMessage('请输入城市名称', true);
                    return;
                }
                loadWeather(city);
            }

            searchBtn.addEventListener('click', handleSearch);
            cityInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSearch();
                }
            });

            // ===== 初始化 =====
            cityInput.value = DEFAULT_CITY;
            loadWeather(DEFAULT_CITY);

        })();
    </script>
<script>
(function() {
  var active = false, hovered = null, ov = null, style = null;
  function enable() {
    if (active) return; active = true;
    ov = document.createElement("div");
    ov.id = "__cf_picker_ov";
    ov.style.cssText = "position:fixed;pointer-events:none;border:2px solid #7c8aff;background:rgba(124,138,255,.1);z-index:999999;display:none;border-radius:2px;";
    document.head.appendChild(ov);
    style = document.createElement("style");
    style.id = "__cf_picker_style";
    style.textContent = ".__cf_hover { outline: 2px solid #7c8aff !important; outline-offset: 2px; }";
    document.head.appendChild(style);
  }
  function disable() {
    active = false;
    if (hovered) { hovered.classList.remove("__cf_hover"); hovered = null; }
    if (ov) { ov.remove(); ov = null; }
    if (style) { style.remove(); style = null; }
  }
  window.addEventListener("message", function(e) {
    if (e.data && e.data.type === "cf-picker-activate") enable();
    if (e.data && e.data.type === "cf-picker-deactivate") disable();
  });
  document.addEventListener("mouseover", function(e) {
    if (!active) return;
    if (hovered) hovered.classList.remove("__cf_hover");
    var el = e.target;
    if (!el || el === document.body || el === document.documentElement || el.id === "__cf_picker_ov") return;
    el.classList.add("__cf_hover");
    hovered = el;
    var r = el.getBoundingClientRect();
    ov.style.display = "block";
    ov.style.top = r.top + "px";
    ov.style.left = r.left + "px";
    ov.style.width = r.width + "px";
    ov.style.height = r.height + "px";
  }, true);
  document.addEventListener("mouseout", function(e) {
    if (!active || hovered !== e.target) return;
    if (hovered) { hovered.classList.remove("__cf_hover"); hovered = null; }
    ov.style.display = "none";
  }, true);
  document.addEventListener("click", function(e) {
    if (!active) return;
    e.preventDefault();
    e.stopPropagation();
    var el = e.target;
    if (!el || el.id === "__cf_picker_ov") return;
    el.classList.remove("__cf_hover"); hovered = null;
    var tag = el.tagName.toLowerCase();
    var id = el.id || "";
    var rawCls = el.className && typeof el.className === "string" ? String(el.className).trim() : "";
    var classes = rawCls.replace(/\b__cf_hover\b/g, "").trim();
    var text = (el.textContent || "").replace(/\s+/g, " ").trim().substring(0, 60);
    var selector = tag;
    if (id) selector += "#" + id;
    else if (classes) selector += "." + classes.split(/\s+/).filter(Boolean).join(".");
    window.parent.postMessage({ type: "cf-pick-element", data: { tag: tag, id: id, classes: classes, text: text, selector: selector, filePath: "index.html" } }, "*");
  }, true);
})();
</script>
