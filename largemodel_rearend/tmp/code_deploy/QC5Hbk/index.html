<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>待办事项列表</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:2rem 1rem}.container{width:100%;max-width:500px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.08);padding:2rem;margin-top:2rem}h1{text-align:center;color:#333;margin-bottom:1.5rem;font-size:1.8rem}.input-group{display:flex;gap:10px;margin-bottom:1.5rem}.input-group input{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:1rem;outline:none;transition:border-color 0.2s}.input-group input:focus{border-color:#4a90d9}.input-group button{padding:12px 24px;background:#4a90d9;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;transition:background 0.2s}.input-group button:hover{background:#357abd}.todo-list{list-style:none;margin-top:0.5rem}.todo-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0;animation:fadeIn 0.2s ease}.todo-item:last-child{border-bottom:none}.todo-item .checkbox-wrapper{flex-shrink:0;margin-right:12px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}.todo-item input[type="checkbox"]{width:20px;height:20px;cursor:pointer;accent-color:#4a90d9}.todo-item .todo-text{flex:1;font-size:1rem;color:#333;word-break:break-word;transition:color 0.2s,text-decoration 0.2s}.todo-item .todo-text.completed{color:#aaa;text-decoration:line-through}.todo-item .delete-btn{flex-shrink:0;width:32px;height:32px;border:none;background:#ff4d4f;color:#fff;border-radius:6px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;margin-left:8px}.todo-item .delete-btn:hover{background:#d9363e}.empty-message{text-align:center;color:#999;padding:2rem 0;font-style:italic}@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}@media(max-width:480px){.container{padding:1.5rem;margin-top:1rem}h1{font-size:1.5rem}.input-group{flex-direction:column}.input-group button{width:100%}}</style></head><body><div class="container"><h1>📋 待办事项</h1><div class="input-group"><input type="text" id="todoInput" placeholder="输入新的待办..." autofocus><button id="addBtn">添加</button></div><ul class="todo-list" id="todoList"></ul><p id="emptyMessage" class="empty-message">暂无待办事项，添加一条吧！</p></div><script>(function(){const STORAGE_KEY='todos_v1';const todoInput=document.getElementById('todoInput');const addBtn=document.getElementById('addBtn');const todoList=document.getElementById('todoList');const emptyMessage=document.getElementById('emptyMessage');let todos=[];function loadTodos(){const stored=localStorage.getItem(STORAGE_KEY);if(stored){try{todos=JSON.parse(stored);if(!Array.isArray(todos))todos=[];}catch(e){todos=[];}}else{todos=[];}}function saveTodos(){localStorage.setItem(STORAGE_KEY,JSON.stringify(todos));}function renderTodo(todo,index){const li=document.createElement('li');li.className='todo-item';li.dataset.index=index;const checkboxWrapper=document.createElement('div');checkboxWrapper.className='checkbox-wrapper';const checkbox=document.createElement('input');checkbox.type='checkbox';checkbox.checked=todo.completed;checkbox.addEventListener('change',function(){todo.completed=this.checked;saveTodos();updateTodoText(li,todo);updateEmptyMessage();});checkboxWrapper.appendChild(checkbox);const textSpan=document.createElement('span');textSpan.className='todo-text'+(todo.completed?' completed':'');textSpan.textContent=todo.text;const deleteBtn=document.createElement('button');deleteBtn.className='delete-btn';deleteBtn.innerHTML='×';deleteBtn.addEventListener('click',function(e){e.stopPropagation();todos.splice(index,1);saveTodos();refreshList();updateEmptyMessage();});li.appendChild(checkboxWrapper);li.appendChild(textSpan);li.appendChild(deleteBtn);return li;}function updateTodoText(li,todo){const textSpan=li.querySelector('.todo-text');if(todo.completed){textSpan.classList.add('completed');}else{textSpan.classList.remove('completed');}}function refreshList(){todoList.innerHTML='';todos.forEach((todo,index)=>{const li=renderTodo(todo,index);todoList.appendChild(li);});updateEmptyMessage();}function updateEmptyMessage(){if(todos.length===0){emptyMessage.style.display='block';}else{emptyMessage.style.display='none';}}function addTodo(){const text=todoInput.value.trim();if(text==='')return;todos.push({text:text,completed:false});saveTodos();refreshList();todoInput.value='';todoInput.focus();}todoInput.addEventListener('keypress',function(e){if(e.key==='Enter'){addTodo();}});addBtn.addEventListener('click',addTodo);loadTodos();refreshList();})();</script></body></html>
