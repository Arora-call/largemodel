<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气预报</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <!-- 头部 -->
    <header class="header">
      <h1 class="header-title">🌤 天气预报</h1>
      <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="请输入城市名称..." value="北京">
        <button class="search-btn" id="searchBtn">搜索</button>
      </div>
    </header>

    <!-- 主要内容区 -->
    <main class="main-content">
      <!-- 加载提示 -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在获取天气数据...</p>
      </div>

      <!-- 错误提示 -->
      <div class="error" id="error">
        <p>⚠️ 获取天气数据失败，请检查城市名称或网络连接。</p>
        <button class="retry-btn" id="retryBtn">重试</button>
      </div>

      <!-- 天气内容 -->
      <div class="weather-content" id="weatherContent">
        <!-- 当前天气 -->
        <section class="current-weather" id="currentWeather">
          <div class="current-header">
            <div class="city-info">
              <h2 class="city-name" id="cityName">--</h2>
              <p class="date" id="currentDate">--</p>
            </div>
            <div class="weather-icon-large" id="weatherIconLarge">☀️</div>
          </div>
          <div class="current-main">
            <div class="temperature-wrap">
              <span class="temperature" id="temperature">--</span>
              <span class="temp-unit">°C</span>
            </div>
            <p class="weather-desc" id="weatherDesc">--</p>
          </div>
          <div class="current-details">
            <div class="detail-item">
              <span class="detail-label">体感温度</span>
              <span class="detail-value" id="feelsLike">--°C</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">湿度</span>
              <span class="detail-value" id="humidity">--%</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">风速</span>
              <span class="detail-value" id="windSpeed">-- km/h</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">降水量</span>
              <span class="detail-value" id="precipitation">-- mm</span>
            </div>
          </div>
        </section>

        <!-- 7天预报 -->
        <section class="forecast" id="forecast">
          <h3 class="forecast-title">📅 未来7天预报</h3>
          <div class="forecast-grid" id="forecastGrid">
            <!-- 由JS生成 -->
          </div>
        </section>
      </div>
    </main>

    <!-- 底部 -->
    <footer class="footer">
      <p>数据来源: Open-Meteo API</p>
    </footer>
  </div>

  <script src="script.js"></script>
<script>
(function() {
  var active = false, hovered = null, ov = null, style = null;
  function enable() {
    if (active) return; active = true;
    ov = document.createElement("div");
    ov.id = "__cf_picker_ov";
    ov.style.cssText = "position:fixed;pointer-events:none;border:2px solid #7c8aff;background:rgba(124,138,255,.1);z-index:999999;display:none;border-radius:2px;";
    document.head.appendChild(ov);
    style = document.createElement("style");
    style.id = "__cf_picker_style";
    style.textContent = ".__cf_hover { outline: 2px solid #7c8aff !important; outline-offset: 2px; }";
    document.head.appendChild(style);
  }
  function disable() {
    active = false;
    if (hovered) { hovered.classList.remove("__cf_hover"); hovered = null; }
    if (ov) { ov.remove(); ov = null; }
    if (style) { style.remove(); style = null; }
  }
  window.addEventListener("message", function(e) {
    if (e.data && e.data.type === "cf-picker-activate") enable();
    if (e.data && e.data.type === "cf-picker-deactivate") disable();
  });
  document.addEventListener("mouseover", function(e) {
    if (!active) return;
    if (hovered) hovered.classList.remove("__cf_hover");
    var el = e.target;
    if (!el || el === document.body || el === document.documentElement || el.id === "__cf_picker_ov") return;
    el.classList.add("__cf_hover");
    hovered = el;
    var r = el.getBoundingClientRect();
    ov.style.display = "block";
    ov.style.top = r.top + "px";
    ov.style.left = r.left + "px";
    ov.style.width = r.width + "px";
    ov.style.height = r.height + "px";
  }, true);
  document.addEventListener("mouseout", function(e) {
    if (!active || hovered !== e.target) return;
    if (hovered) { hovered.classList.remove("__cf_hover"); hovered = null; }
    ov.style.display = "none";
  }, true);
  document.addEventListener("click", function(e) {
    if (!active) return;
    e.preventDefault();
    e.stopPropagation();
    var el = e.target;
    if (!el || el.id === "__cf_picker_ov") return;
    el.classList.remove("__cf_hover"); hovered = null;
    var tag = el.tagName.toLowerCase();
    var id = el.id || "";
    var rawCls = el.className && typeof el.className === "string" ? String(el.className).trim() : "";
    var classes = rawCls.replace(/\b__cf_hover\b/g, "").trim();
    var text = (el.textContent || "").replace(/\s+/g, " ").trim().substring(0, 60);
    var selector = tag;
    if (id) selector += "#" + id;
    else if (classes) selector += "." + classes.split(/\s+/).filter(Boolean).join(".");
    window.parent.postMessage({ type: "cf-pick-element", data: { tag: tag, id: id, classes: classes, text: text, selector: selector, filePath: "index.html" } }, "*");
  }, true);
})();
</script>
</body>
</html>
