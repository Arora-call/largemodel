# Test configuration for codeforge-auth — uses H2 in-memory database
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

# JWT - shorter secret for tests
jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1qd3Qtc2lnbmluZy1pbi10ZXN0cy1ub3QtZm9yLXByb2R1Y3Rpb24K
  expiration: 3600000

conversation:
  cache-ttl: 60

logging:
  level:
    org.example: DEBUG
    org.springframework.security: INFO
    org.springframework.test: INFO
    org.hibernate.SQL: WARN
