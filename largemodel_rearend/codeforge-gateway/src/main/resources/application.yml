server:
  port: 8080

spring:
  application:
    name: codeforge-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: 123456
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Auth Service (:8081) — 认证 + 用户
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/user/**
        # Code Service (:8082) — AI + 项目 + 应用 + 对话 + 统计 + 统一工作台
        - id: code-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/ai/**,/api/projects/**,/api/applications/**,/api/conversations/**,/api/dashboard/**,/api/codegen/**,/api/monitor/**
        # Knowledge Service (:8083) — 知识库
        - id: knowledge-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/knowledge/**
        # Agent Service (:8084) — Agent 工作流
        - id: agent-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/agents/**
        # Admin Service (:8085) — 管理后台 + 模型配置
        - id: admin-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/admin/**

# JWT secret (for gateway-level token parsing)
jwt:
  secret: YTJkZjQzNTY3ODkwYWJjZGVmMTIzNDU2Nzg5MGFiY2RlZjEyMzQ1Njc4OTBhYmNkZWYxMjM0NTY3ODkwYWJjZA==

logging:
  level:
    org.springframework.cloud.gateway: INFO
