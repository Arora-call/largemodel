# ============================================
# CodeForge — Docker Compose 编排
# 用法: docker-compose up -d
# ============================================
version: '3.8'

services:
  # ── 基础设施 ──
  mysql:
    image: mysql:8.0
    container_name: codeforge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: largemodel
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./codeforge-code/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: codeforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ── 业务服务 ──
  gateway:
    build:
      context: .
      args:
        MODULE: codeforge-gateway
    container_name: codeforge-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      JAVA_OPTS: "-XX:+UseZGC -Xmx256m"
    depends_on:
      - auth-service
      - code-service
      - knowledge-service
      - agent-service
      - admin-service

  auth-service:
    build:
      context: .
      args:
        MODULE: codeforge-auth
    container_name: codeforge-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: "8081"
      JAVA_OPTS: "-XX:+UseZGC -Xmx512m"
    depends_on:
      - mysql
      - redis
    volumes:
      - auth-tmp:/app/tmp

  code-service:
    build:
      context: .
      args:
        MODULE: codeforge-code
    container_name: codeforge-code
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: "8082"
      JAVA_OPTS: "-XX:+UseZGC -Xmx512m"
    depends_on:
      - mysql
      - redis
    volumes:
      - code-tmp:/app/tmp

  knowledge-service:
    build:
      context: .
      args:
        MODULE: codeforge-knowledge
    container_name: codeforge-knowledge
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: "8083"
      JAVA_OPTS: "-XX:+UseZGC -Xmx256m"
    depends_on:
      - mysql

  agent-service:
    build:
      context: .
      args:
        MODULE: codeforge-agent
    container_name: codeforge-agent
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: "8084"
      JAVA_OPTS: "-XX:+UseZGC -Xmx256m"
    depends_on:
      - mysql

  admin-service:
    build:
      context: .
      args:
        MODULE: codeforge-admin
    container_name: codeforge-admin
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: "8085"
      JAVA_OPTS: "-XX:+UseZGC -Xmx256m"
    depends_on:
      - mysql

volumes:
  mysql-data:
  auth-tmp:
  code-tmp:
