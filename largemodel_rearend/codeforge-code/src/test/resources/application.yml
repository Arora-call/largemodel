# Test configuration - uses H2 in-memory database
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

  # Disable Redis for tests (auth/user flows don't need it)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT - shorter secret for tests
jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1qd3Qtc2lnbmluZy1pbi10ZXN0cy1ub3QtZm9yLXByb2R1Y3Rpb24K
  expiration: 3600000

# Disable AI config for tests
langchain4j:
  openai:
    base-url: http://localhost:9999
    model-name: test
    temperature: 0.0
    max-tokens: 100

conversation:
  cache-ttl: 60

logging:
  level:
    org.example: DEBUG
    org.springframework.security: INFO
    org.springframework.test: INFO
    org.hibernate.SQL: WARN
