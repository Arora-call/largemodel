# ============================================
# CodeForge — 本地 Nginx 配置（Windows 开发环境）
# 版本: nginx-1.31.2
# 使用: nginx -c D:/Idea-program-file/largemodel/nginx-local.conf
# ============================================
#
# 工作流程：
# 1. 后端部署命令将文件写入 {项目}/largemodel_rearend/tmp/code_deploy/<deployKey>/
# 2. 工作台预览 iframe 加载 http://localhost/<deployKey>/
# 3. Nginx 从 code_deploy 目录提供静态文件

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       D:/nginx-1.31.2/nginx-1.31.2/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip 压缩
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 256;

    server {
        listen 80;
        server_name localhost;

        # API 代理到后端网关（含 SSE 流式响应）
        location /api/ {
            proxy_pass http://localhost:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
        }

        # 部署应用 — /<deployKey>/ 映射到后端代码输出目录
        # 6 位字母数字 deployKey，如 /abc123 或 /abc123/style.css
        location ~ "^/([a-zA-Z0-9]{6})(.*)$" {
            root D:/Idea-program-file/largemodel/largemodel_rearend/tmp/code_deploy;

            # $1 = deployKey, $2 = 剩余路径（如空、/style.css）
            # try_files: 精确文件 → index.html（SPA 回退 + 目录兜底） → 404
            try_files /$1$2 /$1/index.html =404;
        }

        # 根路径返回提示
        location = / {
            default_type text/plain;
            return 200 'CodeForge Nginx OK — 部署路径: http://localhost/<deployKey>/';
        }
    }
}
