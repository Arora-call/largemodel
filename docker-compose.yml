# ============================================
# CodeForge — 完整微服务编排
# 启动: docker compose up -d
# 停止: docker compose down
# ============================================
version: "3.9"

services:
  # ========== 基础设施 ==========
  mysql:
    image: mysql:8.0
    container_name: codeforge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-largemodel}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./largemodel_rearend/codeforge-code/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./largemodel_rearend/codeforge-knowledge/src/main/resources/db/migration_V2__add_knowledge_documents.sql:/docker-entrypoint-initdb.d/02-knowledge.sql:ro
      - ./largemodel_rearend/codeforge-agent/src/main/resources/db/migration_V3__add_agent_workflows.sql:/docker-entrypoint-initdb.d/03-agent.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codeforge-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 微服务 ==========
  gateway:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-gateway
    container_name: codeforge-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - JAVA_TOOL_OPTIONS=-Xmx256m
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  code-service:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-code
    container_name: codeforge-code
    restart: unless-stopped
    ports:
      - "${CODE_PORT:-8082}:8082"
    environment:
      - PORT=8082
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/largemodel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - SPRING_DATA_REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - JAVA_TOOL_OPTIONS=-Xmx512m
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  knowledge-service:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-knowledge
    container_name: codeforge-knowledge
    restart: unless-stopped
    ports:
      - "${KNOWLEDGE_PORT:-8083}:8083"
    environment:
      - PORT=8083
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/largemodel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - JAVA_TOOL_OPTIONS=-Xmx256m
    depends_on:
      mysql:
        condition: service_healthy

  agent-service:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-agent
    container_name: codeforge-agent
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-8084}:8084"
    environment:
      - PORT=8084
      - SERVER_PORT=8084
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/largemodel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - JAVA_TOOL_OPTIONS=-Xmx512m
    depends_on:
      mysql:
        condition: service_healthy

  auth-service:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-auth
    container_name: codeforge-auth
    restart: unless-stopped
    ports:
      - "${AUTH_PORT:-8081}:8081"
    environment:
      - PORT=8081
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/largemodel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - JAVA_TOOL_OPTIONS=-Xmx256m
    depends_on:
      mysql:
        condition: service_healthy

  admin-service:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-admin
    container_name: codeforge-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8085}:8085"
    environment:
      - PORT=8085
      - SERVER_PORT=8085
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/largemodel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - JAVA_TOOL_OPTIONS=-Xmx256m
    depends_on:
      mysql:
        condition: service_healthy

  # ========== 前端 ==========
  frontend:
    build:
      context: ./largemodel_frontend
    container_name: codeforge-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - gateway

volumes:
  mysql_data:
  uploads_data:
