# ============================================
# CodeForge — 完整微服务编排（Docker Compose 一键部署）
# 启动: docker compose up -d
# 停止: docker compose down
# ============================================
version: "3.9"

services:
  # ========== 基础设施 ==========
  mysql:
    image: mysql:8.0
    container_name: codeforge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-largemodel}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./largemodel_rearend/codeforge-code/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codeforge-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v3.1.2
    container_name: codeforge-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
    ports:
      - "8848:8848"    # gRPC（服务注册发现，通信端口）
      - "9848:9848"    # gRPC internal
      - "8888:8888"    # Web 控制台端口（匹配你的 application.properties）
    volumes:
      - nacos_data:/home/nacos/data

  # ========== 微服务 ==========
  gateway:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-gateway
    container_name: codeforge-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  code-service:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-code
    container_name: codeforge-code
    restart: unless-stopped
    ports:
      - "${CODE_PORT:-8082}:8082"
    environment:
      SERVER_PORT: "8082"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/largemodel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      JAVA_TOOL_OPTIONS: "-Xmx512m"
    volumes:
      - uploads_data:/app/uploads
      - deploy_data:/app/tmp/code_deploy
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  knowledge-service:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-knowledge
    container_name: codeforge-knowledge
    restart: unless-stopped
    ports:
      - "${KNOWLEDGE_PORT:-8083}:8083"
    environment:
      SERVER_PORT: "8083"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/largemodel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy

  agent-service:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-agent
    container_name: codeforge-agent
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-8084}:8084"
    environment:
      SERVER_PORT: "8084"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/largemodel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      JAVA_TOOL_OPTIONS: "-Xmx512m"
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy

  auth-service:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-auth
    container_name: codeforge-auth
    restart: unless-stopped
    ports:
      - "${AUTH_PORT:-8081}:8081"
    environment:
      SERVER_PORT: "8081"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/largemodel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy

  admin-service:
    build:
      context: ./largemodel_rearend
      args:
        MODULE: codeforge-admin
    container_name: codeforge-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8085}:8085"
    environment:
      SERVER_PORT: "8085"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/largemodel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy

  # ========== 前端 Nginx ==========
  frontend:
    build:
      context: ./largemodel_frontend
    container_name: codeforge-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - gateway
    volumes:
      - deploy_data:/var/www/deployed

volumes:
  mysql_data:
  uploads_data:
  nacos_data:
  deploy_data: