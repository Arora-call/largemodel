server {
    listen 80;
    server_name localhost;

    # 前端静态资源
    root /usr/share/nginx/html;
    index index.html;

    # 部署的应用文件目录（deployKey 子目录）
    set $deploy_root /var/www/deployed;

    # SPA 路由 — 所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端网关
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # AI 流式生成 + 统一工作台（SSE，禁用缓冲）
    location /api/ai/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # 统一工作台 SSE（禁用缓冲）
    location /api/codegen/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # Agent 工作流 SSE（禁用缓冲，5 Agent 链式执行耗时长）
    location /api/agents/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # 项目文件 API SSE（文件树读取）
    location /api/projects/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
    }

    # 部署应用访问 — /<deployKey>/ 映射到部署目录
    # try_files: 先精确匹配文件，再试目录 index.html（支持 SPA）
    location ~ ^/([a-zA-Z0-9]{6})(/.*)?$ {
        root $deploy_root;
        try_files /$1$2 /$1/$2 /$1/index.html =404;
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length 256;
}
